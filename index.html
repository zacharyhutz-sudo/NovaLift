<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#050816" />
    <title>NovaLift v0.1</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main id="gameShell">
      <canvas id="gameCanvas" aria-label="NovaLift 2D vertical space flight sandbox"></canvas>

      <section id="hud" class="panel hud-panel" aria-label="Flight status">
        <div class="brand-row">
          <div>
            <div class="hud-title">NovaLift</div>
            <div class="hud-subtitle">v0.1 Flight Sandbox</div>
          </div>
          <button class="icon-button" type="button" data-press-action="debug" aria-label="Toggle debug panel">DBG</button>
        </div>
        <div class="hud-grid">
          <div>Altitude</div><strong id="altitude">0 m</strong>
          <div>Speed</div><strong id="speed">0 m/s</strong>
          <div>Fuel</div><strong id="fuel">100%</strong>
          <div>Status</div><strong id="status">Ready</strong>
          <div>FPS</div><strong id="fps">60</strong>
        </div>
      </section>

      <section id="mission" class="panel mission-panel">
        <div class="mission-label">Mission</div>
        <h1>Reach stable orbit</h1>
        <p>Launch, tilt sideways, and build horizontal speed.</p>
        <div id="missionResult" class="mission-result">Orbit hold: 0.0s / 6.0s</div>
      </section>

      <section id="touchControls" class="touch-controls" aria-label="Touch flight controls">
        <div class="touch-actions">
          <button class="small-control" type="button" data-press-action="reset">Reset</button>
          <button class="small-control" type="button" data-press-action="pause">Pause</button>
        </div>

        <div class="flight-controls">
          <button class="control-button rotate-button" type="button" data-hold-action="left" aria-label="Rotate left">
            <span>↺</span>
            <small>Left</small>
          </button>
          <button class="control-button thrust-button" type="button" data-hold-action="thrust" aria-label="Thrust">
            <span>▲</span>
            <small>Thrust</small>
          </button>
          <button class="control-button rotate-button" type="button" data-hold-action="right" aria-label="Rotate right">
            <span>↻</span>
            <small>Right</small>
          </button>
        </div>

        <div class="keyboard-hint">Keyboard: W thrust · A/D rotate · R reset · Space pause · F debug</div>
      </section>

      <section id="debugPanel" class="panel debug-panel hidden">
        <div class="debug-title">Debug</div>
        <pre id="debugText"></pre>
      </section>
    </main>

    <script type="module" src="src/main.js"></script>
  </body>
</html>
